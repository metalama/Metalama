name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - "develop/*"
      - "release/*"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request using the pr-reviewer agent. Focus on:
            - Code quality issues (bugs, race conditions, resource leaks)
            - Security vulnerabilities
            - Missing or inadequate documentation on public APIs
            - Missing test coverage

            Do NOT report:
            - Formatting issues
            - Compiler warnings (handled by build process)
            - Issues in unchanged code

            Provide your review organized into: Critical Issues, Recommendations, Suggestions, Positive Observations, and Summary.
          claude_args: "--max-turns 10"
