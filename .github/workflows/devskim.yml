name: DevSkim

on:
  push:
    branches: [ "release/*" ]
  pull_request:
    branches: [ "release/*" ]
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight UTC

permissions:
  contents: read

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6 # v1.0.16
        with:
        # DS172412 - Review unsafe code
        # DS176209 - TODO
          exclude-rules: DS172412,DS176209
          ignore-globs: '**/bin.**,**/obj.**,**/.git/**'
          extra-options: '-s Critical,Important,Moderate,BestPractice'
            

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@2d92b76c45b91eb80fc44c74ce3fce0ee94e8f9d # v3.29.5
        with:
          sarif_file: devskim-results.sarif